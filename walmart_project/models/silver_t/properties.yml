models:
  - name: products_t
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

      - name: product_name
        tests:
          - not_null:
              config:
                where: "price > 0"

  - name: orders_t
    columns:
      - name: order_id
        tests:
          - not_null
          - unique